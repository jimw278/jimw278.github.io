<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clairo Song Ranker</title>
<link rel="stylesheet" href="src/styles.css">
<style>
  * { box-sizing: border-box; }

  main {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  a, .link-btn {
    color: #ffffff;
  }

  p.muted, .muted {
    color: #ffffff;
  }

  /* --- Intro screen --- */
  .intro-card {
    text-align: left;
    line-height: 1.6;
    margin: 0 auto;
    max-width: 480px;
  }

  .intro-card ul { padding-left: 20px; }
  .intro-card .warning {
    border: 1px solid #666;
    padding: 10px 14px;
    font-size: 0.85rem;
    color: #ffffff;
    margin-top: 16px;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    background: transparent;
    color: #ffffff;
    border: 1px solid #999;
    padding: 10px 24px;
    font-size: 0.95rem;
  }
  button:hover { border-color: #fff; background: #444; }

  .btn-primary { margin-top: 18px; }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 18px;
  }

  /* --- Progress --- */
  .progress-wrap {
    max-width: 480px;
    margin: 0 auto 20px;
    text-align: center;
    font-size: 0.8rem;
    color: #ffffff;
  }

  /* --- Battle screen --- */
  .versus-row {
    display: flex;
    align-items: stretch;
    gap: 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  .song-card {
    flex: 1;
    border: 1px solid #777;
    padding: 30px 14px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 150px;
    cursor: pointer;
  }
  .song-card:hover { border-color: #fff; background: #3d3d3d; }

  .song-title {
    font-family: "Lucida Grande", "Lucida Sans Unicode", "Lucida Sans", sans-serif;
    font-size: 1.2rem;
    margin: 0 0 6px;
    line-height: 1.3;
  }

  .vs-label {
    align-self: center;
    color: #ffffff;
    font-family: "Lucida Grande", "Lucida Sans Unicode", "Lucida Sans", sans-serif;
    font-style: normal;
    font-size: 1.0 rem;
    padding: 0 2px;
  }



  .caution {
    margin-top: 20px;
    font-size: 0.75rem;
    color: #ffffff;
    text-align: center;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
  }

  /* --- Results screen --- */
  .results-header { margin-bottom: 18px; }

  .results-list {
    list-style: none;
    margin: 0;
    padding: 0;
    max-width: 480px;
    margin: 0 auto;
  }

  .results-list li {
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #555;
    padding: 10px 4px;
    text-align: left;
  }

  .rank-num {
    font-family: Georgia, serif;
    font-size: 1rem;
    color: #ffffff;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  .result-info { flex: 1; }
  .result-title { font-size: 0.95rem; }

  .results-actions {
    display: flex;
    gap: 10px;
    margin: 20px 0 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  @media (max-width: 480px) {
    .versus-row { flex-direction: column; }
    .vs-label { padding: 4px 0; }
  }
</style>
</head>
<body>

<h1>Clairo Song Ranker</h1>

<main>

  <!-- INTRO -->
  <section id="screen-intro" class="screen active">
    <div class="intro-card">
      <p>Rank every released Clairo song by choosing your favorite from each pair!</p>
    </div>
    <div class="btn-row">
      <button id="start-btn" class="btn-primary">Start Sorting</button>
    </div>
  </section>

  <!-- BATTLE -->
  <section id="screen-battle" class="screen">
    <div class="progress-wrap">
      <span id="progress-pct">0% sorted</span>
    </div>

    <div class="versus-row">
      <div class="song-card" id="card-left" tabindex="0"></div>
      <div class="vs-label">vs</div>
      <div class="song-card" id="card-right" tabindex="0"></div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="screen-results" class="screen">
    <div class="results-header">
      <h1 style="font-size:1.5rem;">Your Ranking</h1>
    </div>
    <ol class="results-list" id="results-list"></ol>
    <div class="results-actions">
      <button id="restart-btn">Start Over</button>
    </div>
  </section>

</main>

<script>
(function () {
  "use strict";

  const SONGS = [
    // Immunity (2019)
    { title: "Alewife", album: "Immunity" },
    { title: "Impossible", album: "Immunity" },
    { title: "Closer to You", album: "Immunity" },
    { title: "North", album: "Immunity" },
    { title: "Bags", album: "Immunity" },
    { title: "Softly", album: "Immunity" },
    { title: "Sofia", album: "Immunity" },
    { title: "White Flag", album: "Immunity" },
    { title: "Feel Something", album: "Immunity" },
    { title: "Sinking", album: "Immunity" },
    { title: "I Wouldn't Ask You", album: "Immunity" },
    // Sling (2021)
    { title: "Bambi", album: "Sling" },
    { title: "Amoeba", album: "Sling" },
    { title: "Partridge", album: "Sling" },
    { title: "Zinnias", album: "Sling" },
    { title: "Blouse", album: "Sling" },
    { title: "Wade", album: "Sling" },
    { title: "Harbor", album: "Sling" },
    { title: "Just for Today", album: "Sling" },
    { title: "Joanie", album: "Sling" },
    { title: "Reaper", album: "Sling" },
    { title: "Little Changes", album: "Sling" },
    { title: "Management", album: "Sling" },
    // Charm (2024)
    { title: "Nomad", album: "Charm" },
    { title: "Sexy to Someone", album: "Charm" },
    { title: "Second Nature", album: "Charm" },
    { title: "Slow Dance", album: "Charm" },
    { title: "Thank You", album: "Charm" },
    { title: "Terrapin", album: "Charm" },
    { title: "Juna", album: "Charm" },
    { title: "Add Up My Love", album: "Charm" },
    { title: "Echo", album: "Charm" },
    { title: "Glory of the Snow", album: "Charm" },
    { title: "Pier 4", album: "Charm" },
    // Diary 001 (2018 EP)
    { title: "Hello?", album: "Diary 001", note: "feat. Rejjie Snow" },
    { title: "Flaming Hot Cheetos", album: "Diary 001" },
    { title: "B.O.M.D.", album: "Diary 001", note: "feat. Danny L Harle" },
    { title: "4Ever", album: "Diary 001" },
    { title: "Pretty Girl", album: "Diary 001" },
    { title: "How (Demo)", album: "Diary 001" },
    // Non-album singles (lead / co-lead artist)
    { title: "Get with U", album: "Single", note: "2017" },
    { title: "2 Hold U", album: "Single", note: "2017" },
    { title: "Better", album: "Single", note: "with SG Lewis, 2018" },
    { title: "Drown", album: "Single", note: "with Cuco, 2018" },
    { title: "Heaven", album: "Single", note: "2018" },
    { title: "Sis", album: "Single", note: "2019" },
    { title: "Bubble Gum", album: "Single", note: "2019" },
    { title: "Love Songs", album: "Single", note: "Margo Guryan cover, 2024" },
  ];

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function estimateComparisons(n) {
    if (n <= 1) return 0;
    const mid = Math.floor(n / 2);
    const left = mid, right = n - mid;
    return estimateComparisons(left) + estimateComparisons(right) + (left + right - 1);
  }

  const screens = {
    intro: document.getElementById("screen-intro"),
    battle: document.getElementById("screen-battle"),
    results: document.getElementById("screen-results"),
  };

  function showScreen(name) {
    Object.values(screens).forEach((s) => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  const cardLeft = document.getElementById("card-left");
  const cardRight = document.getElementById("card-right");
  const progressPctEl = document.getElementById("progress-pct");

  let comparisonsDone = 0;
  let totalEstimate = 1;
  let resolveCompare = null;

  function renderCard(el, song) {
    el.innerHTML = "";
    const title = document.createElement("div");
    title.className = "song-title";
    title.textContent = song.title;
    el.appendChild(title);
  }

  function updateProgress() {
    const pct = Math.min(99, Math.round((comparisonsDone / totalEstimate) * 100));
    progressPctEl.textContent = pct + "% sorted";
  }

  function compare(a, b) {
    renderCard(cardLeft, a);
    renderCard(cardRight, b);
    updateProgress();
    return new Promise((resolve) => {
      resolveCompare = (result) => {
        comparisonsDone++;
        resolve(result);
      };
    });
  }

  cardLeft.addEventListener("click", () => resolveCompare && resolveCompare(-1));
  cardRight.addEventListener("click", () => resolveCompare && resolveCompare(1));
  cardLeft.addEventListener("keydown", (e) => { if (e.key === "Enter") resolveCompare && resolveCompare(-1); });
  cardRight.addEventListener("keydown", (e) => { if (e.key === "Enter") resolveCompare && resolveCompare(1); });

  async function mergeSort(arr) {
    if (arr.length <= 1) return arr;
    const mid = Math.floor(arr.length / 2);
    const left = await mergeSort(arr.slice(0, mid));
    const right = await mergeSort(arr.slice(mid));
    return merge(left, right);
  }

  async function merge(left, right) {
    const result = [];
    let i = 0, j = 0;
    while (i < left.length && j < right.length) {
      const cmp = await compare(left[i], right[j]);
      if (cmp <= 0) {
        result.push(left[i]); i++;
      } else {
        result.push(right[j]); j++;
      }
    }
    while (i < left.length) result.push(left[i++]);
    while (j < right.length) result.push(right[j++]);
    return result;
  }

  async function runSort() {
    comparisonsDone = 0;
    totalEstimate = Math.max(1, estimateComparisons(SONGS.length));
    showScreen("battle");
    const shuffled = shuffle(SONGS);
    const ranked = await mergeSort(shuffled);
    showResults(ranked);
  }

  function showResults(ranked) {
    const list = document.getElementById("results-list");
    list.innerHTML = "";
    ranked.forEach((song, idx) => {
      const li = document.createElement("li");

      const rank = document.createElement("div");
      rank.className = "rank-num";
      rank.textContent = (idx + 1) + ".";

      const info = document.createElement("div");
      info.className = "result-info";
      const t = document.createElement("div");
      t.className = "result-title";
      t.textContent = song.title;
      info.appendChild(t);

      li.appendChild(rank);
      li.appendChild(info);
      list.appendChild(li);
    });
    window.__lastRanking = ranked;
    showScreen("results");
  }

  document.getElementById("start-btn").addEventListener("click", runSort);
  document.getElementById("restart-btn").addEventListener("click", runSort);

  // Prevent accidental navigation-away (Backspace) from wiping progress, as warned above.
  document.addEventListener("keydown", (e) => {
    const tag = (e.target && e.target.tagName) || "";
    if (e.key === "Backspace" && tag !== "INPUT" && tag !== "TEXTAREA") {
      e.preventDefault();
    }
  });

  window.addEventListener("beforeunload", (e) => {
    if (screens.battle.classList.contains("active")) {
      e.preventDefault();
      e.returnValue = "";
    }
  });
})();
</script>

</body>
</html>
